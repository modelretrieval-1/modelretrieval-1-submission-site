name: modelretrieval-staging

services:
  app:
    image: ${APP_IMAGE:-modelretrieval-submissions:staging}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: staging
      DATABASE_PATH: /data/app.sqlite3
      STORAGE_ROOT: /data/storage
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
