{% extends "base.html" %}

{% block title %}Change Password - {{ app_name }}{% endblock %}

{% block content %}
  <section class="panel auth-panel">
    <div class="page-header">
      <div>
        <h1>Change Password</h1>
        <p>{{ account.display_name }} ({{ account.user_id }})</p>
      </div>
    </div>

    {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    {% if success %}
      <div class="alert alert-success" role="status">{{ success }}</div>
    {% endif %}

    <form method="post" action="/account/password" class="form-stack">
      <div>
        <label class="form-label" for="current_password">Current Password</label>
        <input class="form-control" id="current_password" type="password" name="current_password" autocomplete="current-password" required>
      </div>
      <div>
        <label class="form-label" for="new_password">New Password</label>
        <input class="form-control" id="new_password" type="password" name="new_password" autocomplete="new-password" required>
      </div>
      <div>
        <label class="form-label" for="confirm_password">Confirm New Password</label>
        <input class="form-control" id="confirm_password" type="password" name="confirm_password" autocomplete="new-password" required>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" type="submit">Change Password</button>
        <a class="btn btn-outline-secondary" href="{% if account.role == 'organizer' %}/admin{% else %}/team{% endif %}">Dashboard</a>
      </div>
    </form>
  </section>
{% endblock %}
